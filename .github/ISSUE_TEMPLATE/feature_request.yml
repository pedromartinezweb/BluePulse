name: Feature request
description: Suggest a focused BluePulse improvement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the smallest useful change.
    validations:
      required: true
  - type: textarea
    id: boundaries
    attributes:
      label: Safety boundaries
      description: Confirm that the request does not require input simulation, policy bypassing, services, or data collection.
    validations:
      required: true
