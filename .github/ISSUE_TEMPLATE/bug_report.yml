name: Bug report
description: Report a reproducible BluePulse problem.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a problem. Please include enough detail to reproduce it.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps that trigger the issue.
      placeholder: |
        1. Run BluePulse.exe
        2. Enable the utility
        3. ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: Release tag, commit, or build source.
      placeholder: main-2-1
    validations:
      required: false
  - type: input
    id: windows
    attributes:
      label: Windows version
      placeholder: Windows 11 24H2
    validations:
      required: false
  - type: textarea
    id: notes
    attributes:
      label: Additional context
      description: Add screenshots, logs, or other relevant context.
    validations:
      required: false
